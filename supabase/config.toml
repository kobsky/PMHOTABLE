project_id = "hotable-compass"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "https://pmhotable.netlify.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.generate-weekly-summary]
verify_jwt = false

# Cron: piątek 17:00 UTC (18:00 CET / 19:00 CEST)
# UWAGA: pg_cron wymaga Supabase Pro.
# Aby włączyć: Dashboard → Database → Extensions → pg_cron
# Następnie uruchom w SQL Editor:
#   SELECT cron.schedule(
#     'weekly-summary-friday',
#     '0 17 * * 5',
#     $$SELECT net.http_post(
#       url := current_setting('app.supabase_url') || '/functions/v1/generate-weekly-summary',
#       headers := '{"Content-Type":"application/json","Authorization":"Bearer ' || current_setting('app.service_role_key') || '"}'::jsonb,
#       body := '{}'::jsonb
#     )$$
#   );
#
# Manualnie: supabase functions invoke generate-weekly-summary --no-verify-jwt
